name: digitalocean
version: v0.3.0
description: |-
  DevPod on DigitalOcean (fixed: graceful shutdown, persistent mounts)
icon: https://devpod.sh/assets/digitalocean.svg
optionGroups:
  - options:
      - DISK_SIZE
      - DISK_IMAGE
      - MACHINE_TYPE
    name: "Digital Ocean options"
  - options:
      - AGENT_PATH
      - AGENT_DATA_PATH
      - INACTIVITY_TIMEOUT
      - INJECT_DOCKER_CREDENTIALS
      - INJECT_GIT_CREDENTIALS
    name: "Agent options"
options:
  TOKEN:
    description: The DigitalOcean token to use.
    required: true
    password: true
    command: "if [ ! -z \"${DIGITALOCEAN_TOKEN}\" ]; then echo ${DIGITALOCEAN_TOKEN}; elif [ ! -z \"${DIGITALOCEAN_ACCESS_TOKEN}\" ]; then echo ${DIGITALOCEAN_ACCESS_TOKEN}; fi"
  REGION:
    description: The digital ocean region to use. E.g. fra1
    required: true
    default: fra1
    suggestions:
      - ams2
      - ams3
      - blr1
      - fra1
      - lon1
      - nyc1
      - nyc2
      - nyc3
      - sfo1
      - sfo2
      - sfo3
      - atl1
      - sgp1
      - tor1
      - syd1
  DISK_SIZE:
    description: The disk size in GB.
    default: "30"
  DISK_IMAGE:
    description: The disk image to use.
    default: docker-20-04
    suggestions:
      - docker-20-04
      - ubuntu-22-04-x64
      - ubuntu-24-04-x64
      - debian-12-x64
  MACHINE_TYPE:
    description: The machine type to use.
    default: s-4vcpu-8gb
    suggestions:
      - s-1vcpu-2gb
      - s-2vcpu-4gb
      - s-4vcpu-8gb
      - s-8vcpu-16gb
      - c-2
      - c-4
      - c-8
      - c-16
      - c-32
  INACTIVITY_TIMEOUT:
    description: If defined, will automatically stop the VM after the inactivity period.
    default: 10m
  INJECT_GIT_CREDENTIALS:
    description: "If DevPod should inject git credentials into the remote host."
    default: "true"
  INJECT_DOCKER_CREDENTIALS:
    description: "If DevPod should inject docker credentials into the remote host."
    default: "true"
  AGENT_PATH:
    description: The path where to inject the DevPod agent to.
    default: /home/devpod/.devpod/devpod
  AGENT_DATA_PATH:
    description: The path where to store the agent data.
    default: /home/devpod/.devpod/agent
agent:
  path: ${AGENT_PATH}
  dataPath: ${AGENT_DATA_PATH}
  inactivityTimeout: ${INACTIVITY_TIMEOUT}
  injectGitCredentials: ${INJECT_GIT_CREDENTIALS}
  injectDockerCredentials: ${INJECT_DOCKER_CREDENTIALS}
  binaries:
    DO_PROVIDER:
      - os: linux
        arch: amd64
        path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.3.0/devpod-provider-digitalocean-linux-amd64
        checksum: 6f0c2bb0b24ded1c18ea99aebcc9deb6809777b85a3d0d28622b286909d04b6d
      - os: linux
        arch: arm64
        path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.3.0/devpod-provider-digitalocean-linux-arm64
        checksum: 403aa7593305fe005e914bfbbe6dc450ff1c3e9c1ea9165f32c82ab1424cfdb4
  exec:
    shutdown: |-
      ${DO_PROVIDER} stop
binaries:
  DO_PROVIDER:
    - os: linux
      arch: amd64
      path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.3.0/devpod-provider-digitalocean-linux-amd64
      checksum: 6f0c2bb0b24ded1c18ea99aebcc9deb6809777b85a3d0d28622b286909d04b6d
    - os: linux
      arch: arm64
      path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.3.0/devpod-provider-digitalocean-linux-arm64
      checksum: 403aa7593305fe005e914bfbbe6dc450ff1c3e9c1ea9165f32c82ab1424cfdb4
    - os: darwin
      arch: amd64
      path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.3.0/devpod-provider-digitalocean-darwin-amd64
      checksum: c462ff7ebe31406b2388caa1090dd733c5754d5abacaa77befb1f43ae1daf2fe
    - os: darwin
      arch: arm64
      path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.3.0/devpod-provider-digitalocean-darwin-arm64
      checksum: e0c3abbfa822398ad10f222182ec524983f557a84f8176bab5749c6effc07c29
    - os: windows
      arch: amd64
      path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.3.0/devpod-provider-digitalocean-windows-amd64.exe
      checksum: 586f20b9f2b11b54920b70f44b13a39adc9771f93a1e2918d2fef2553309d416
exec:
  init: ${DO_PROVIDER} init
  command: ${DO_PROVIDER} command
  create: ${DO_PROVIDER} create
  delete: ${DO_PROVIDER} delete
  start: ${DO_PROVIDER} start
  stop: ${DO_PROVIDER} stop
  status: ${DO_PROVIDER} status
