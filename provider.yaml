name: digitalocean
version: v0.2.0
description: |-
  DevPod on DigitalOcean (fixed: graceful shutdown, persistent mounts)
icon: https://devpod.sh/assets/digitalocean.svg
optionGroups:
  - options:
      - DISK_SIZE
      - DISK_IMAGE
      - MACHINE_TYPE
    name: "Digital Ocean options"
  - options:
      - AGENT_PATH
      - AGENT_DATA_PATH
      - INACTIVITY_TIMEOUT
      - INJECT_DOCKER_CREDENTIALS
      - INJECT_GIT_CREDENTIALS
    name: "Agent options"
options:
  TOKEN:
    description: The DigitalOcean token to use.
    required: true
    password: true
    command: "if [ ! -z \"${DIGITALOCEAN_TOKEN}\" ]; then echo ${DIGITALOCEAN_TOKEN}; elif [ ! -z \"${DIGITALOCEAN_ACCESS_TOKEN}\" ]; then echo ${DIGITALOCEAN_ACCESS_TOKEN}; fi"
  REGION:
    description: The digital ocean region to use. E.g. fra1
    required: true
    default: fra1
    suggestions:
      - ams2
      - ams3
      - blr1
      - fra1
      - lon1
      - nyc1
      - nyc2
      - nyc3
      - sfo1
      - sfo2
      - sfo3
      - atl1
      - sgp1
      - tor1
      - syd1
  DISK_SIZE:
    description: The disk size in GB.
    default: "30"
  DISK_IMAGE:
    description: The disk image to use.
    default: docker-20-04
    suggestions:
      - docker-20-04
      - ubuntu-22-04-x64
      - ubuntu-24-04-x64
      - debian-12-x64
  MACHINE_TYPE:
    description: The machine type to use.
    default: s-4vcpu-8gb
    suggestions:
      - s-1vcpu-2gb
      - s-2vcpu-4gb
      - s-4vcpu-8gb
      - s-8vcpu-16gb
      - c-2
      - c-4
      - c-8
      - c-16
      - c-32
  INACTIVITY_TIMEOUT:
    description: If defined, will automatically stop the VM after the inactivity period.
    default: 10m
  INJECT_GIT_CREDENTIALS:
    description: "If DevPod should inject git credentials into the remote host."
    default: "true"
  INJECT_DOCKER_CREDENTIALS:
    description: "If DevPod should inject docker credentials into the remote host."
    default: "true"
  AGENT_PATH:
    description: The path where to inject the DevPod agent to.
    default: /home/devpod/.devpod/devpod
  AGENT_DATA_PATH:
    description: The path where to store the agent data.
    default: /home/devpod/.devpod/agent
agent:
  path: ${AGENT_PATH}
  dataPath: ${AGENT_DATA_PATH}
  inactivityTimeout: ${INACTIVITY_TIMEOUT}
  injectGitCredentials: ${INJECT_GIT_CREDENTIALS}
  injectDockerCredentials: ${INJECT_DOCKER_CREDENTIALS}
  binaries:
    DO_PROVIDER:
      - os: linux
        arch: amd64
        path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.2.0/devpod-provider-digitalocean-linux-amd64
        checksum: b809a79c7d7421ad50f0bc32c193da2ffbd0866be7e05f66daa52c9d43d04680
      - os: linux
        arch: arm64
        path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.2.0/devpod-provider-digitalocean-linux-arm64
        checksum: 683905656493f45cbdf52415de93dd1ecbd6b11c15acbff407a33471bb52ea3b
  exec:
    shutdown: |-
      ${DO_PROVIDER} stop
binaries:
  DO_PROVIDER:
    - os: linux
      arch: amd64
      path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.2.0/devpod-provider-digitalocean-linux-amd64
      checksum: b809a79c7d7421ad50f0bc32c193da2ffbd0866be7e05f66daa52c9d43d04680
    - os: linux
      arch: arm64
      path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.2.0/devpod-provider-digitalocean-linux-arm64
      checksum: 683905656493f45cbdf52415de93dd1ecbd6b11c15acbff407a33471bb52ea3b
    - os: darwin
      arch: amd64
      path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.2.0/devpod-provider-digitalocean-darwin-amd64
      checksum: d20bec510b1be39a5a034fab44dffcca647bd8173db6035da9badf435d1b9269
    - os: darwin
      arch: arm64
      path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.2.0/devpod-provider-digitalocean-darwin-arm64
      checksum: 8f6135996ecb889428097ad4aaa6b8f316fef021e746374215fa21d91011965b
    - os: windows
      arch: amd64
      path: https://github.com/joelgmiller/devpod-provider-digitalocean/releases/download/v0.2.0/devpod-provider-digitalocean-windows-amd64.exe
      checksum: 120c4750e8fba73aefb7b1db2b4179d16f7ee30c1ef1cf4772c69f74b1af8faf
exec:
  init: ${DO_PROVIDER} init
  command: ${DO_PROVIDER} command
  create: ${DO_PROVIDER} create
  delete: ${DO_PROVIDER} delete
  start: ${DO_PROVIDER} start
  stop: ${DO_PROVIDER} stop
  status: ${DO_PROVIDER} status
